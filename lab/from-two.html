<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form(form2)</title>
    <ref rel="stylesheet" href="form3.css">
</head>
 
<body>
 
    <div class="foujia">
 
        <div class="header">
            <h1>Registration</h1>
            <p>Please complete all fields below.</p>
            <hr>
        </div>
 
        <div class="foujia1">
 
            <div class="r">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Foujia Faruk">
            </div>
 
            <div class="r">
                <label for="postalcode">Postal Code</label>
                <input type="number" id="postalcode" name="postalcode" placeholder="10001">
            </div>
 
            <div class="r">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob">
            </div>
 
            <div class="r">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="foujia@gmail.com">
            </div>
 
            <div class="r">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="********">
            </div>
 
            <div class="r">
                <label for="country">Country</label>
                <select id="country" name="country">
                    <option value="">Select a country...</option>
                    <option value="bangladesh">Bangladesh</option>
                    <option value="usa">United States</option>
                    <option value="uk">United Kingdom</option>
                </select>
            </div>
 
            <div class="button">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
 
        </div>
 
    </div>
 
</body>
 
</html>
